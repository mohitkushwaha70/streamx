<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamX Avatar Preview</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0B1120;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #E2E8F0;
      gap: 40px;
      padding: 40px;
    }
    h1 {
      font-size: 2rem;
      background: linear-gradient(135deg, #3B82F6, #60A5FA);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
    }
    .grid {
      display: flex;
      gap: 60px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      text-align: center;
    }
    .card label {
      display: block;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #94A3B8;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    /* Dark background preview */
    .preview-dark {
      background: #0F172A;
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(59,130,246,0.15);
    }
    /* Glass background preview */
    .preview-glass {
      background: rgba(30,41,59,0.7);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    /* Profile card mock */
    .profile-card {
      background: linear-gradient(145deg, #1E293B, #0F172A);
      border-radius: 20px;
      padding: 32px;
      width: 280px;
      border: 1px solid rgba(59,130,246,0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .profile-card .name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 16px;
    }
    .profile-card .role {
      font-size: 0.8rem;
      color: #60A5FA;
      margin-top: 4px;
    }
    .sizes {
      display: flex;
      gap: 24px;
      align-items: flex-end;
      flex-wrap: wrap;
      justify-content: center;
    }
    .size-item { text-align: center; }
    .size-item span {
      display: block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: #64748B;
    }
  </style>
</head>
<body>
  <h1>StreamX Premium Avatar</h1>

  <div class="grid">
    <div class="card preview-dark">
      <img src="streamx-avatar-premium.svg" width="200" height="200" style="border-radius:50%;">
      <label>Default Profile Avatar</label>
    </div>
    <div class="card profile-card">
      <img src="streamx-avatar-premium.svg" width="80" height="80" style="border-radius:50%; box-shadow: 0 0 20px rgba(59,130,246,0.3);">
      <div class="name">Mohit Kushwaha</div>
      <div class="role">Premium Member</div>
    </div>
    <div class="card preview-glass">
      <img src="streamx-avatar-default.svg" width="200" height="200" style="border-radius:50%;">
      <label>Alternative Design</label>
    </div>
  </div>

  <div class="sizes">
    <div class="size-item">
      <img src="streamx-avatar-premium.svg" width="120" height="120" style="border-radius:50%; box-shadow: 0 0 24px rgba(59,130,246,0.35);">
      <span>120px - Profile</span>
    </div>
    <div class="size-item">
      <img src="streamx-avatar-premium.svg" width="64" height="64" style="border-radius:50%; box-shadow: 0 0 16px rgba(59,130,246,0.3);">
      <span>64px - Comment</span>
    </div>
    <div class="size-item">
      <img src="streamx-avatar-premium.svg" width="40" height="40" style="border-radius:50%; box-shadow: 0 0 10px rgba(59,130,246,0.25);">
      <span>40px - Navbar</span>
    </div>
    <div class="size-item">
      <img src="streamx-avatar-premium.svg" width="32" height="32" style="border-radius:50%;">
      <span>32px - Mini</span>
    </div>
    <div class="size-item">
      <img src="streamx-avatar-premium.svg" width="24" height="24" style="border-radius:50%;">
      <span>24px - Icon</span>
    </div>
  </div>
</body>
</html>
