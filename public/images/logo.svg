<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0d4ff"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <rect width="42" height="42" x="3" y="3" rx="10" fill="url(#grad)"/>
  <polygon points="17,12 17,34 34,23" fill="url(#playGrad)" opacity="0.95"/>
  <line x1="28" y1="10" x2="36" y2="18" stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="10" x2="28" y2="18" stroke="rgba(255,255,255,0.85)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Text STREAM -->
  <text x="52" y="30" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="-0.5">STREAM</text>
  <!-- Text X with gradient -->
  <text x="153" y="30" font-family="Inter,system-ui,-apple-system,sans-serif" font-size="22" font-weight="800" fill="url(#grad)" letter-spacing="-0.5">X</text>
</svg>
