<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0e6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Play triangle -->
  <polygon points="24,16 24,48 48,32" fill="url(#play)" filter="url(#glow)" opacity="0.95"/>
  <!-- X mark -->
  <line x1="40" y1="14" x2="52" y2="26" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="14" x2="40" y2="26" stroke="rgba(255,255,255,0.9)" stroke-width="3" stroke-linecap="round"/>
</svg>
