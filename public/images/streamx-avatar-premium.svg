<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="25%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="75%" stop-color="#2563EB" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E7FF" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="innerHighlight" cx="32%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#93C5FD" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#60A5FA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomFade" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="85%" stop-color="#3B82F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="glassTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.23  0 0 0 0 0.51  0 0 0 0 0.96  0 0 0 0.6 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#1E40AF" flood-opacity="0.4"/>
    </filter>
    <filter id="innerShine">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dy="-2"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="white" flood-opacity="0.15"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode/>
      </feMerge>
    </filter>
    <clipPath id="circClip">
      <circle cx="512" cy="512" r="370"/>
    </clipPath>
  </defs>

  <!-- Transparent background - no rect -->

  <!-- Outer glow aura -->
  <circle cx="512" cy="512" r="470" fill="url(#outerGlow)"/>

  <!-- Shadow disc -->
  <circle cx="512" cy="524" r="374" fill="#1E40AF" opacity="0.25" filter="url(#shadow)"/>

  <!-- Outer decorative ring -->
  <circle cx="512" cy="512" r="398" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.7"/>
  <!-- Second subtle ring -->
  <circle cx="512" cy="512" r="405" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.2"/>

  <!-- Main circle - dark base -->
  <circle cx="512" cy="512" r="370" fill="#0F172A"/>

  <!-- Blue gradient fill -->
  <circle cx="512" cy="512" r="370" fill="url(#mainGrad)" opacity="0.88"/>

  <!-- Inner highlight for 3D depth -->
  <circle cx="512" cy="512" r="370" fill="url(#innerHighlight)"/>

  <!-- Bottom dark fade for depth -->
  <circle cx="512" cy="512" r="370" fill="url(#bottomFade)"/>

  <!-- Glass top reflection -->
  <circle cx="512" cy="512" r="370" fill="url(#glassTop)"/>

  <!-- Inner accent ring -->
  <circle cx="512" cy="512" r="352" fill="none" stroke="white" stroke-width="0.8" opacity="0.06"/>

  <!-- === User Silhouette === -->
  <!-- Head -->
  <circle cx="512" cy="388" r="88" fill="url(#silhouette)"/>

  <!-- Body/shoulders -->
  <path d="M 357 580 Q 357 520 430 500 L 512 480 L 594 500 Q 667 520 667 580 L 667 700 Q 667 730 630 730 L 394 730 Q 357 730 357 700 Z" fill="url(#silhouette)" filter="url(#innerShine)"/>
  <!-- Cleaner body -->
  <ellipse cx="512" cy="620" rx="150" ry="110" fill="url(#silhouette)"/>

  <!-- Head-body blend -->
  <rect x="424" y="440" width="176" height="50" rx="25" fill="url(#silhouette)" opacity="0.9"/>

  <!-- Specular highlight on head -->
  <ellipse cx="480" cy="355" rx="40" ry="18" fill="white" opacity="0.12" transform="rotate(-20 480 355)"/>

  <!-- Subtle rim light on right -->
  <path d="M 575 340 Q 600 380 600 420" fill="none" stroke="white" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>

  <!-- Top glass shine arc -->
  <path d="M 380 350 Q 420 280 520 275 Q 560 274 580 290" fill="none" stroke="white" stroke-width="1.2" opacity="0.18" stroke-linecap="round"/>

  <!-- Bottom edge highlight -->
  <ellipse cx="512" cy="870" rx="180" ry="4" fill="white" opacity="0.04"/>
</svg>